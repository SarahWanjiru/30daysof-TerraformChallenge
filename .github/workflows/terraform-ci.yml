name: Terraform CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform:
    name: Validate and Plan
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-north-1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: day16

      - name: Validate day16 module
        working-directory: day16/modules/services/webserver-cluster
        run: |
          terraform init -backend=false
          terraform validate

      - name: Plan day16 dev
        id: plan
        working-directory: day16/live/dev/services/webserver-cluster
        run: |
          terraform init
          terraform plan -no-color
        continue-on-error: true
        env:
          TF_VAR_db_secret_name: "day13/db/credentials"

      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📖
            \`\`\`
            ${{ steps.plan.outputs.stdout }}
            \`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
