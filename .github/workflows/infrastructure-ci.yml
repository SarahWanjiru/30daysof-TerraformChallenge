name: Infrastructure CI

on:
  pull_request:
    branches: [main]
  pull_request_target:
    types: [closed]
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-north-1

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"

      - name: Format check
        run: terraform fmt -check -recursive
        working-directory: day22

      - name: Init
        run: terraform init -backend=false
        working-directory: day22/modules/services/webserver-cluster

      - name: Validate
        run: terraform validate
        working-directory: day22/modules/services/webserver-cluster

      - name: Unit tests
        run: terraform test
        working-directory: day22/modules/services/webserver-cluster

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-north-1

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"

      - name: Init
        run: terraform init
        working-directory: day22/live/dev/services/webserver-cluster
        env:
          TF_VAR_db_secret_name: "day13/db/credentials"

      - name: Plan
        run: terraform plan -no-color
        working-directory: day22/live/dev/services/webserver-cluster
        env:
          TF_VAR_db_secret_name: "day13/db/credentials"

  # integration tests only run when a PR is merged to main
  # not on direct pushes, not on every PR open
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true
    needs: validate

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-north-1

    steps:
      - uses: actions/checkout@v4

      - name: Pre-cleanup - Remove orphaned resources from previous runs
        if: github.event_name == 'pull_request_target' && github.event.pull_request.merged == true
        run: |
          echo "Cleaning up any orphaned resources from previous test runs..."
          
          # Scale down any existing test ASGs
          aws autoscaling describe-auto-scaling-groups \
            --query 'AutoScalingGroups[*].AutoScalingGroupName' \
            --output text | grep -E 'test-cluster|terratest' | while read asg; do
            echo "Pre-cleanup: Scaling down ASG: $asg"
            aws autoscaling update-auto-scaling-group \
              --auto-scaling-group-name "$asg" \
              --min-size 0 --desired-capacity 0 --max-size 0 || true
          done
          
          # Terminate any existing test instances
          echo "Pre-cleanup: Terminating existing test instances..."
          aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=test-cluster-*" \
                      "Name=instance-state-name,Values=running,pending" \
            --query 'Reservations[*].Instances[*].InstanceId' \
            --output text | xargs -r aws ec2 terminate-instances --instance-ids || true
          
          echo "Pre-cleanup complete"

      - uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"

      - name: Run Integration Tests
        run: go test -v -timeout 30m ./...
        working-directory: day18/test

      - name: Cleanup on Success or Failure
        if: always()
        run: |
          echo "Cleaning up AWS resources..."
          
          # Scale down any test ASGs
          aws autoscaling describe-auto-scaling-groups \
            --query 'AutoScalingGroups[*].AutoScalingGroupName' \
            --output text | grep -E 'test-cluster|terratest' | while read asg; do
            echo "Scaling down ASG: $asg"
            aws autoscaling update-auto-scaling-group \
              --auto-scaling-group-name "$asg" \
              --min-size 0 --desired-capacity 0 --max-size 0 || true
          done
          
          # Terminate any lingering test instances
          echo "Terminating orphaned test instances..."
          aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=test-cluster-*" \
                      "Name=instance-state-name,Values=running,pending" \
            --query 'Reservations[*].Instances[*].InstanceId' \
            --output text | xargs -r aws ec2 terminate-instances --instance-ids || true
          
          echo "Cleanup complete"
