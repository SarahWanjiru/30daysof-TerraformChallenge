name: Infrastructure CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-north-1

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"

      - name: Format check
        run: terraform fmt -check -recursive
        working-directory: day22

      - name: Init
        run: terraform init -backend=false
        working-directory: day22/modules/services/webserver-cluster

      - name: Validate
        run: terraform validate
        working-directory: day22/modules/services/webserver-cluster

      - name: Unit tests
        run: terraform test
        working-directory: day22/modules/services/webserver-cluster

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-north-1

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"

      - name: Init
        run: terraform init
        working-directory: day22/live/dev/services/webserver-cluster
        env:
          TF_VAR_db_secret_name: "day13/db/credentials"

      - name: Plan
        run: terraform plan -no-color
        working-directory: day22/live/dev/services/webserver-cluster
        env:
          TF_VAR_db_secret_name: "day13/db/credentials"

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: validate

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: eu-north-1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: "1.21"

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"

      - name: Run Integration Tests
        run: go test -v -timeout 30m ./...
        working-directory: day18/test
